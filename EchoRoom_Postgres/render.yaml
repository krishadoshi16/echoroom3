services:
  # 1. PostgreSQL Database
  - type: pgo
    name: echoroom-db
    plan: free

  # 2. Django Backend
  - type: web
    name: echoroom-backend
    env: python
    plan: free
    buildCommand: "./backend/build.sh"
    startCommand: "cd backend && gunicorn echoroom.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: echoroom-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "echoroom-backend.onrender.com"

  # 3. React Frontend (Vite)
  - type: web
    name: echoroom-frontend
    env: static
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://echoroom-backend.onrender.com"
