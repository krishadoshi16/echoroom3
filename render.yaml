databases:
  - name: echoroom-db
    plan: free

services:
  # 1. Django Backend
  - type: web
    name: echoroom-backend-v3
    env: python
    plan: free
    rootDir: EchoRoom_Postgres/backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn echoroom.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: echoroom-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "echoroom-backend-v3.onrender.com"

  # 2. React Frontend (Vite)
  - type: web
    name: echoroom-frontend-v3
    env: static
    rootDir: EchoRoom_Postgres/frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "dist"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://echoroom-backend-v3.onrender.com"
